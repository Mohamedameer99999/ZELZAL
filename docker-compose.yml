version: "3.9"

services:
  zelzal:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=change-me-in-production
      - JWT_SECRET_KEY=change-me-too
      - FLASK_DEBUG=0
    volumes:
      - zelzal_data:/app/backend/instance
    restart: unless-stopped

volumes:
  zelzal_data:
