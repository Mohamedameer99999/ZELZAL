services:
  - type: web
    name: zelzal
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/auth/login
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: zelzal-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "0"

databases:
  - name: zelzal-db
    databaseName: zelzal
    user: zelzal
