services:
  - type: web
    name: zelzal
    env: python
    buildCommand: |
      pip install -r backend/requirements.txt
      cd frontend && npm install && npm run build
    startCommand: cd backend && python app.py
    healthCheckPath: /api/auth/me
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: zelzal-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "0"

databases:
  - name: zelzal-db
    databaseName: zelzal
    user: zelzal
